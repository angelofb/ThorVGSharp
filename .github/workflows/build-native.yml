name: Build ThorVG Native Libraries

on:
  workflow_dispatch:

jobs:
  build:
    name: Build ${{ matrix.rid }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - rid: linux-x64
            runner: ubuntu-latest
            meson-output: libthorvg-1.so
            target-name: libthorvg.so
            extra: lottie_exp,openmp
          - rid: osx-arm64
            runner: macos-latest
            meson-output: libthorvg-1.dylib
            target-name: libthorvg.dylib
            extra: lottie_exp
          - rid: win-x64
            runner: windows-latest
            meson-output: thorvg-1.dll
            target-name: thorvg.dll
            extra: lottie_exp,openmp
            msvc-arch: amd64
          - rid: win-x86
            runner: windows-latest
            meson-output: thorvg-1.dll
            target-name: thorvg.dll
            extra: lottie_exp,openmp
            msvc-arch: x86

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          submodules: recursive

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.x"

      - name: Install Meson and Ninja
        run: pip install meson ninja

      - name: Set up MSVC
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: ${{ matrix.msvc-arch }}

      - name: Configure ThorVG
        run: >
          meson setup builddir external/thorvg
          -Dbuildtype=release
          -Db_lto=true
          -Dstatic=true
          -Dengines="sw,gl"
          -Dbindings=capi
          -Dloaders="svg,lottie,ttf,png,jpg,webp"
          -Dsavers=
          -Dthreads=true
          -Dsimd=true
          -Dpartial=true
          -Dfile=false
          -Dlog=false
          -Dextra="${{ matrix.extra }}"

      - name: Build ThorVG
        run: meson compile -C builddir

      - name: Copy library
        shell: bash
        run: |
          mkdir -p runtimes/${{ matrix.rid }}/native
          cp builddir/src/${{ matrix.meson-output }} runtimes/${{ matrix.rid }}/native/${{ matrix.target-name }}

      - name: Upload artifact
        uses: actions/upload-artifact@v6
        with:
          name: thorvg-${{ matrix.rid }}
          path: runtimes/${{ matrix.rid }}/native/

  collect:
    name: Collect native libraries
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          ref: ${{ github.ref }}

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Assemble runtimes
        run: |
          for rid in linux-x64 osx-arm64 win-x64 win-x86; do
            mkdir -p runtimes/$rid/native
            cp artifacts/thorvg-$rid/* runtimes/$rid/native/
          done

      - name: Upload combined artifact
        uses: actions/upload-artifact@v6
        with:
          name: thorvg-native-all
          path: runtimes/

      - name: Commit and push updated runtimes
        if: startsWith(github.ref, 'refs/heads/') && github.ref_name != 'main'
        env:
          BRANCH_NAME: ${{ github.ref_name }}
        run: |
          if git diff --quiet -- runtimes; then
            echo "No runtime changes detected. Nothing to commit."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add runtimes/

          if git diff --cached --quiet; then
            echo "No staged runtime changes. Nothing to commit."
            exit 0
          fi

          git commit -m "Update native runtimes from CI artifacts"
          git push origin "HEAD:${BRANCH_NAME}"
